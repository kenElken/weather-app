<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kohalik ilm</title>
  <link rel="stylesheet" href="styles.css">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  >
</head>
<body>
  <div class="container">
    <h1>Ilm hetkel...</h1>
    <p>Sisesta linna nimi ja vaata hetke ilma.</p>

    <div class="app-layout">
      <div id="map"></div>

      <div class="info-panel">
        <div class="search-box">
          <input type="text" id="cityInput" placeholder="Näiteks: Tartu">
          <button id="searchBtn">Näita ilma</button>
        </div>

        <div id="result" class="result hidden">
          <h2 id="cityName"></h2>
          <p><strong>Temperatuur:</strong> <span id="temperature"></span> °C</p>
          <p><strong>Tuule kiirus:</strong> <span id="windspeed"></span> km/h</p>
          <p><strong>Ilmaolud:</strong> <span id="weathercode"></span></p>
        </div>

        <p id="error" class="error"></p>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
